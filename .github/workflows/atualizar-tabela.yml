name: Atualizar tabela CPT ES

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Baixar dados do RREO/Siconfi
        run: python scripts/01_baixar_rreo.py

      - name: Gerar diagnostico de linhas
        run: python scripts/02_diagnosticar_linhas.py

      - name: Calcular CPT/CPA do ES
        run: python scripts/03_calcular_cpt_es.py

      - name: Gerar pagina HTML
        run: python scripts/04_gerar_html.py

      - name: Atualizar pagina no repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Update CPT ES HTML page" || echo "Sem alteracoes na pagina"
          git push

      - name: Publicar artefatos
        uses: actions/upload-artifact@v4
        with:
          name: tabela-cpt-es
          path: |
            outputs/*
            docs/index.html
            data/interim/linhas_candidatas_icms_iss_fundeb.csv
